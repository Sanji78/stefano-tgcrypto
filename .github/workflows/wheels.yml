name: wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build cp314 musllinux wheel in container
        run: |
          set -euxo pipefail
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            plat=linux/arm64
            image=quay.io/pypa/musllinux_1_2_aarch64:latest
          else
            plat=linux/amd64
            image=quay.io/pypa/musllinux_1_2_x86_64:latest
          fi

          docker pull --platform "$plat" "$image"

          docker run --rm --platform "$plat" \
            -v "${GITHUB_WORKSPACE}:/project" \
            -w /project \
            "$image" sh -lc '
              set -eux
              apk add --no-cache build-base linux-headers python3-dev
              /opt/python/cp314-cp314/bin/python -m pip install -U pip build
              /opt/python/cp314-cp314/bin/python -m pip wheel . -w /project/wheelhouse
            '

          ls -la wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist