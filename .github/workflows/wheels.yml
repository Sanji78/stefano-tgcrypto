name: wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Debug: list /opt/python in musllinux image
        run: |
            docker run --rm quay.io/pypa/musllinux_1_2_${{ matrix.arch }}:latest sh -lc 'ls -1 /opt/python || true'
            
      - name: Build wheels (musllinux)
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: "cp313-musllinux_${{ matrix.arch }} cp314-musllinux_${{ matrix.arch }}"
          CIBW_ARCHS_LINUX: "${{ matrix.arch }}"
          CIBW_PRERELEASE_PYTHONS: "1"
          CIBW_TEST_SKIP: "*"
          
          # override musllinux image to a newer tag that includes cp314
          CIBW_MUSLLINUX_X86_64_IMAGE: "quay.io/pypa/musllinux_1_2_x86_64:latest"
          CIBW_MUSLLINUX_AARCH64_IMAGE: "quay.io/pypa/musllinux_1_2_aarch64:latest"

          # deps needed to compile tgcrypto in musllinux container
          CIBW_BEFORE_ALL_LINUX: >
            apk add --no-cache
            build-base
            linux-headers
            python3-dev
        # if tgcrypto needs openssl headers too, add: openssl-dev

      - name: Assert cp314 wheel exists
        run: |
            ls -la wheelhouse
            python - <<'PY'
            import glob, sys
            if not glob.glob("wheelhouse/*cp314*.whl"):
                raise SystemExit("cp314 wheel not produced (likely interpreter missing in musllinux image).")
            PY
    
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
