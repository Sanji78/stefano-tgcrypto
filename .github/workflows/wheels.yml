name: wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheels (musllinux)
        uses: pypa/cibuildwheel@v2.23.0
        env:
          CIBW_BUILD: "cp313-musllinux_* cp314-musllinux_* cp314t-musllinux_*"
          CIBW_ARCHS_LINUX: "${{ matrix.arch }}"
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_VERBOSITY: "3"
          CIBW_DEBUG_TRACEBACK: "1"
          CIBW_ENABLE: "cpython-prerelease cpython-freethreading"

          CIBW_MUSLLINUX_X86_64_IMAGE: "quay.io/pypa/musllinux_1_2_x86_64:latest"
          CIBW_MUSLLINUX_AARCH64_IMAGE: "quay.io/pypa/musllinux_1_2_aarch64:latest"

          CIBW_BEFORE_ALL_LINUX: apk add --no-cache build-base linux-headers python3-dev
          
      - name: Assert cp314 wheel exists
        run: python -c "import glob,sys; sys.exit(0 if glob.glob('wheelhouse/*cp314*.whl') else 1)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist